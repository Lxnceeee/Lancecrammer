<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Personal Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="h-full">
    <!-- ========================================
         NAVIGATION BAR
    ======================================== -->
    <nav class="nav-glass sticky top-0 z-50 px-4 sm:px-6 py-3">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <a href="index.html" class="text-lg sm:text-xl font-bold tracking-tight">Lance Kobe Legaspi</a>
        <div class="flex flex-wrap items-center gap-1">
          <a href="index.html" class="nav-link text-sm font-medium">
            <i data-lucide="home" class="icon-14 icon-inline icon-gap-4"></i>Home
          </a>
          <a href="about.html" class="nav-link text-sm font-medium">
            <i data-lucide="user" class="icon-14 icon-inline icon-gap-4"></i>About
          </a>
          <a href="projects.html" class="nav-link text-sm font-medium">
            <i data-lucide="briefcase" class="icon-14 icon-inline icon-gap-4"></i>Projects
          </a>
          <a href="contact.html" class="nav-link active-link text-sm font-medium">
            <i data-lucide="mail" class="icon-14 icon-inline icon-gap-4"></i>Contact
          </a>
        </div>
        <button id="themeToggle" class="theme-toggle ml-3" type="button" aria-label="Toggle theme">
          <span class="theme-toggle-knob">
            <i data-lucide="moon" class="theme-icon theme-icon--moon"></i>
            <i data-lucide="sun" class="theme-icon theme-icon--sun"></i>
          </span>
        </button>
      </div>
    </nav>

    <!-- ========================================
         CONTACT SECTION
    ======================================== -->
    <main>
      <section class="max-w-2xl mx-auto px-6 py-16 sm:py-20">
        <div class="text-center mb-12">
          <p class="text-sm font-medium uppercase tracking-widest mb-2 opacity-60">Let's talk</p>
          <h1 class="text-3xl sm:text-5xl font-bold mb-4">Contact Me</h1>
          <div class="section-divider w-20 h-1 rounded-full mx-auto"></div>
          <p class="mt-4 opacity-70 max-w-md mx-auto">
            Have a project in mind or just want to say hi? Drop me a message and I'll get back to you soon.
          </p>
        </div>

        <!-- Simple form that you can connect later -->
        <form id="contactForm" class="space-y-5">
          <div>
            <label for="nameInput" class="block text-sm font-medium mb-2 opacity-80">
              <i data-lucide="user" class="icon-14 icon-inline icon-gap-4"></i>Your Name
            </label>
            <input type="text" id="nameInput" placeholder="John Doe" class="form-input w-full px-5 py-3 rounded-xl text-sm">
          </div>
          <div>
            <label for="messageInput" class="block text-sm font-medium mb-2 opacity-80">
              <i data-lucide="message-square" class="icon-14 icon-inline icon-gap-4"></i>Your Message
            </label>
            <textarea id="messageInput" rows="5" placeholder="Tell me about your project..." class="form-input w-full px-5 py-3 rounded-xl text-sm resize-none"></textarea>
          </div>
          <button type="submit" class="btn-primary w-full py-4 rounded-xl font-semibold text-sm transition-all hover:scale-[1.02] hover:shadow-lg flex items-center justify-center gap-2">
            <i data-lucide="send" class="icon-16"></i>
            <span>Send Email</span>
          </button>
        </form>

        <!-- Social icons -->
        <div class="flex justify-center gap-4 mt-10">
          <a href="https://github.com/Lxnceeee" target="_blank" rel="noopener noreferrer" class="surface-card w-10 h-10 rounded-xl flex items-center justify-center transition-all hover:scale-110 cursor-pointer card-hover" aria-label="GitHub">
            <i data-lucide="github" class="icon-18"></i>
          </a>
          <a href="https://www.facebook.com/L4nzuuuu" target="_blank" rel="noopener noreferrer" class="surface-card w-10 h-10 rounded-xl flex items-center justify-center transition-all hover:scale-110 cursor-pointer card-hover" aria-label="Facebook">
            <i data-lucide="facebook" class="icon-18"></i>
          </a>
          <a href="https://www.instagram.com/1xncee/" target="_blank" rel="noopener noreferrer" class="surface-card w-10 h-10 rounded-xl flex items-center justify-center transition-all hover:scale-110 cursor-pointer card-hover" aria-label="Instagram">
            <i data-lucide="instagram" class="icon-18"></i>
          </a>
        </div>
      </section>
    </main>

    <script>
      lucide.createIcons();

      const themeToggle = document.getElementById('themeToggle');
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('theme-light');
      }
      themeToggle?.addEventListener('click', () => {
        document.body.classList.toggle('theme-light');
        const isLight = document.body.classList.contains('theme-light');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
      });

      const form = document.getElementById('contactForm');
      form?.addEventListener('submit', (event) => {
        event.preventDefault();
        const name = document.getElementById('nameInput')?.value?.trim() || '';
        const message = document.getElementById('messageInput')?.value?.trim() || '';

        const subject = encodeURIComponent(`Portfolio Message from ${name || 'Visitor'}`);
        const bodyLines = [
          `Name: ${name || 'N/A'}`,
          message || 'No message provided.'
        ];
        const body = encodeURIComponent(bodyLines.join('\n'));
        window.location.href = `mailto:lancekobeleaspi@gmail.com?subject=${subject}&body=${body}`;
      });
    </script>
  </body>
</html>
